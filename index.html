<!DOCTYPE html>

    <link rel="apple-touch-icon" sizes="180x180" href="cards.png.jpg">
    <link rel="icon" type="image/jpeg" href="cards.png.jpg">
    <link rel="shortcut icon" href="cards.png.jpg">

    <!-- iOS WEB APP META -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- ANDROID/CHROME META -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a4d2e">

    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(180deg, #0a4d2e 0%, #083a23 100%);
            color: #fff;
            margin: 0;
            padding: 20px;
            user-select: none;
        }
.container { max-width: 500px; margin: 0 auto; }
        h1 { text-align: center; margin: 10px 0; font-size: 1.8em; }
.stats-bar {
            display: flex;
            justify-content: space-around;
            background: #083a23;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #1a5c3a;
            margin-bottom: 15px;
        }
.stat { text-align: center; }
.stat-value { font-weight: bold; color: #ffd700; font-size: 1.2em; }
.pack-section {
            background: #083a23;
            padding: 20px;
            border-radius: 12px;
            border: 2px solid #1a5c3a;
            margin-bottom: 20px;
        }
.pack-buttons {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
.pack-btn {
            border: 3px solid #fff;
            color: #0a4d2e;
            padding: 18px;
            font-size: 1.1em;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
.pack-btn:hover:not(:disabled) { transform: scale(1.03); }
.pack-btn:active { transform: scale(0.98); }
.pack-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.pack-standard { background: linear-gradient(135deg, #8d8d8d, #c0c0c0); }
.pack-premium {
            background: linear-gradient(135deg, #d4af37, #ffd700);
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
        }
.pack-ultimate {
            background: linear-gradient(135deg, #ff6b35, #f72585, #b5179e);
            box-shadow: 0 4px 15px rgba(247, 37, 133, 0.5);
            animation: rainbow 3s linear infinite;
        }
        @keyframes rainbow {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }
.pack-odds { font-size: 0.75em; opacity: 0.9; margin-top: 5px; }
.cards-display {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin: 20px 0;
            min-height: 140px;
            perspective: 1000px;
        }
.card {
            background: #1a5c3a;
            border: 2px solid #2d7a4f;
            border-radius: 8px;
            padding: 8px 4px;
            text-align: center;
            font-size: 0.75em;
            cursor: pointer;
            transition: all 0.3s;
            opacity: 0;
            transform: rotateY(90deg) scale(0.5);
        }
.card.show {
            opacity: 1;
            transform: rotateY(0) scale(1);
        }
.card:hover { transform: translateY(-5px) scale(1.05); }
.card.bronze { border-color: #cd7f32; background: linear-gradient(135deg, #1a5c3a, #4a3a1a); }
.card.silver { border-color: #c0c0c0; background: linear-gradient(135deg, #1a5c3a, #4a4a4a); }
.card.gold {
            border-color: #ffd700;
            background: linear-gradient(135deg, #1a5c3a, #4a4a1a);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
            animation: goldGlow 1s ease-in-out;
        }
.card.legend {
            border-color: #ff6b35;
            background: linear-gradient(135deg, #1a5c3a, #4a1a1a);
            box-shadow: 0 0 20px rgba(255, 107, 53, 0.8);
            animation: legendPulse 0.6s ease-in-out;
        }
        @keyframes goldGlow {
            0%, 100% { box-shadow: 0 0 15px rgba(255, 215, 0, 0.5); }
            50% { box-shadow: 0 0 30px rgba(255, 215, 0, 0.9); }
        }
        @keyframes legendPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); box-shadow: 0 0 40px rgba(255, 107, 53, 1); }
            100% { transform: scale(1); }
        }
.card-rating { font-weight: bold; font-size: 1.3em; margin-bottom: 3px; }
.card-name { font-size: 0.8em; line-height: 1.1; }
.card-value { font-size: 0.7em; opacity: 0.8; margin-top: 3px; }
.confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #ffd700;
            pointer-events: none;
            z-index: 9999;
            animation: confettiFall 2s linear forwards;
        }
        @keyframes confettiFall {
            to { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
.tabs { display: flex; gap: 10px; margin-bottom: 15px; }
.tab {
            flex: 1;
            background: #1a5c3a;
            border: 2px solid #2d7a4f;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
.tab.active { background: #2d7a4f; border-color: #ffd700; }
.collection {
            background: #083a23;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #1a5c3a;
            max-height: 400px;
            overflow-y: auto;
        }
.collection-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
.collection-card {
            background: #1a5c3a;
            border: 2px solid #2d7a4f;
            border-radius: 6px;
            padding: 6px 3px;
            text-align: center;
            font-size: 0.7em;
        }
.collection-card.owned { opacity: 1; }
.collection-card.unowned { opacity: 0.3; filter: grayscale(100%); }
.progress-bar {
            background: #1a5c3a;
            height: 20px;
            border-radius: 10px;
            margin: 10px 0;
            overflow: hidden;
        }
.progress-fill {
            background: linear-gradient(90deg, #2d7a4f, #ffd700);
            height: 100%;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
            font-weight: bold;
        }
.shop-item {
            background: #1a5c3a;
            border: 2px solid #2d7a4f;
            border-radius: 8px;
            margin: 10px 0;
            padding: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
.shop-item:hover:not(.disabled) { background: #2d7a4f; }
.shop-item.disabled { opacity: 0.4; cursor: not-allowed; }
.rebirth {
            background: linear-gradient(135deg, #8b6914, #d4af37);
            border: 2px solid #ffd700;
        }
.sell-all-btn {
            background: #e74c3c;
            border: 2px solid #c0392b;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin: 10px 0;
            width: 100%;
        }
.debug { font-size: 0.8em; opacity: 0.7; text-align: center; margin-top: 10px; }
    </style>
</head>

for (var j = 0; j < PLAYERS.length; j++) {
    collection[PLAYERS[j].name] = 0;
}

function debug(msg) {
    console.log(msg);
    var d = document.getElementById('debug');
    if (d) d.textContent = msg;
}

function getPackOdds(packType) {
    var base = PACKS[packType];
    var legendBonus = (betterPackLevel * 0.01) + (prestige * 0.01);
    return {
        legend: base.legend + legendBonus,
        gold: base.gold,
        silver: base.silver
    };
}

function openPack(packType) {
    try {
        debug('openPack called: ' + packType);

        if (openingPack) {
            debug('Already opening a pack...');
            return;
        }

        var pack = PACKS[packType];
        if (money < pack.cost) {
            debug('Not enough money!');
            return;
        }

        openingPack = true;
        money -= pack.cost;
        updateDisplay();
        debug('Opening ' + packType + ' pack...');

        var cardsDisplay = document.getElementById('cardsDisplay');
        cardsDisplay.innerHTML = '';

        var odds = getPackOdds(packType);
        var cardsOpened = 0;

        for (var i = 0; i < 5; i++) {
            (function(index) {
                setTimeout(function() {
                    try {
                        var rand = Math.random();
                        var rarity;
                        if (rand < odds.legend) rarity = "legend";
                        else if (rand < odds.legend + odds.gold) rarity = "gold";
                        else if (rand < odds.legend + odds.gold + odds.silver) rarity = "silver";
                        else rarity = "bronze";

                        var pool = [];
                        for (var k = 0; k < PLAYERS.length; k++) {
                            if (PLAYERS[k].rarity === rarity) pool.push(PLAYERS[k]);
                        }
                        var card = pool[Math.floor(Math.random() * pool.length)];

                        collection[card.name]++;
                        if (collection[card.name] === 1) totalCards++;

                        var cardEl = document.createElement('div');
                        cardEl.className = 'card ' + card.rarity;
                        cardEl.innerHTML = '<div class="card-rating">' + card.rating + '</div><div class="card-name">' + card.name + '</div><div class="card-value">£' + card.value + '</div>';
                        cardEl.onclick = function() { sellCard(card.name); };
                        cardsDisplay.appendChild(cardEl);

                        setTimeout(function() {
                            cardEl.classList.add('show');
                            if (card.rarity === 'legend') createConfetti();
                        }, 50);

                        cardsOpened++;
                        if (cardsOpened === 5) {
                            setTimeout(function() {
                                openingPack = false;
                                updateDisplay();
                                saveGame();
                                renderCollection();
                                debug('Pack opened! Tap duplicates to sell.');
                            }, 600);
                        }
                    } catch (e) {
                        console.error('Card error:', e);
                        openingPack = false;
                        updateDisplay();
                    }
                }, index * 300);
            })(i);
        }
    } catch (e) {
        console.error('Pack error:', e);
        debug('Error: ' + e.message);
        openingPack = false;
        updateDisplay();
    }
}

function createConfetti() {
    for (var i = 0; i < 30; i++) {
        var confetti = document.createElement('div');
        confetti.className = 'confetti';
        confetti.style.left = Math.random() * 100 + '%';
        confetti.style.background = ['#ffd700', '#ff6b35', '#f72585', '#4caf50'][Math.floor(Math.random() * 4)];
        confetti.style.animationDelay = Math.random() * 0.5 + 's';
        document.body.appendChild(confetti);
        setTimeout(function(c) { return function() { c.remove(); }; }(confetti), 2000);
    }
}

function sellCard(cardName) {
    if (collection[cardName] > 1) {
        var card = null;
        for (var i = 0; i < PLAYERS.length; i++) {
            if (PLAYERS[i].name === cardName) {
                card = PLAYERS[i];
                break;
            }
        }
        collection[cardName]--;
        money += Math.floor(card.value * 0.5);
        updateDisplay();
        saveGame();
        debug('Sold ' + cardName + ' for £' + Math.floor(card.value * 0.5));
    }
}

function sellAllDuplicates() {
    var earned = 0;
    for (var name in collection) {
        if (collection[name] > 1) {
            var card = null;
            for (var i = 0; i < PLAYERS.length; i++) {
                if (PLAYERS[i].name === name) {
                    card = PLAYERS[i];
                    break;
                }
            }
            var dupes = collection[name] - 1;
            earned += Math.floor(card.value * 0.5) * dupes;
            collection[name] = 1;
        }
    }
    money += earned;
    updateDisplay();
    saveGame();
    renderCollection();
    debug('Sold duplicates for £' + earned);
}

function buyBetterPacks() {
    if (money >= betterPackCost) {
        money -= betterPackCost;
        betterPackLevel++;
        betterPackCost = Math.floor(betterPackCost * 2);
        updateDisplay();
        saveGame();
    }
}

function doPrestige() {
    if (money < 100000) return;

    if (confirm('Prestige for £100,000?\n\nYou will lose all cards and money but gain 2x pack luck on ALL packs permanently!\nThis stacks with each prestige.')) {
        prestige++;
        money = 5000;
        totalCards = 0;
        betterPackLevel = 0;
        betterPackCost = 10000;
        for (var i = 0; i < PLAYERS.length; i++) {
            collection[PLAYERS[i].name] = 0;
        }
        updateDisplay();
        saveGame();
        renderCollection();
        document.getElementById('cardsDisplay').innerHTML = '';
        debug('Prestiged! ' + prestige + 'x luck bonus');
    }
}

function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });

    if (tab === 'collection') {
        document.getElementById('collectionTab').classList.add('active');
        document.getElementById('collection-tab').style.display = 'block';
        document.getElementById('shop-tab').style.display = 'none';
        renderCollection();
    } else {
        document.getElementById('shopTab').classList.add('active');
        document.getElementById('collection-tab').style.display = 'none';
        document.getElementById('shop-tab').style.display = 'block';
    }
}
