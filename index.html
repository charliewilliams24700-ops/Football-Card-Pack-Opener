<!DOCTYPE html>
<html>
<head>
    <title>Football Card Pack Opener</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Home Screen Icon Setup - Using cards.png.jpg -->
    <link rel="apple-touch-icon" href="cards.png.jpg">
    <link rel="icon" type="image/jpeg" href="cards.png.jpg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Card Packs">
    <meta name="theme-color" content="#0a4d2e">

    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(180deg, #0a4d2e 0%, #083a23 100%);
            color: #fff;
            margin: 0;
            padding: 20px;
            user-select: none;
        }
       .container {
            max-width: 500px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin: 10px 0;
            font-size: 1.8em;
        }
       .stats-bar {
            display: flex;
            justify-content: space-around;
            background: #083a23;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #1a5c3a;
            margin-bottom: 15px;
        }
       .stat {
            text-align: center;
        }
       .stat-value {
            font-weight: bold;
            color: #ffd700;
            font-size: 1.2em;
        }
       .pack-section {
            background: #083a23;
            padding: 20px;
            border-radius: 12px;
            border: 2px solid #1a5c3a;
            margin-bottom: 20px;
        }
       .pack-buttons {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
       .pack-btn {
            border: 3px solid #fff;
            color: #0a4d2e;
            padding: 18px;
            font-size: 1.1em;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }
       .pack-btn:hover:not(:disabled) {
            transform: scale(1.03);
        }
       .pack-btn:active {
            transform: scale(0.98);
        }
       .pack-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
       .pack-standard {
            background: linear-gradient(135deg, #8d8d8d, #c0c0c0);
        }
       .pack-premium {
            background: linear-gradient(135deg, #d4af37, #ffd700);
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
        }
       .pack-ultimate {
            background: linear-gradient(135deg, #ff6b35, #f72585, #b5179e);
            box-shadow: 0 4px 15px rgba(247, 37, 133, 0.5);
            animation: rainbow 3s linear infinite;
        }
        @keyframes rainbow {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }
       .pack-odds {
            font-size: 0.75em;
            opacity: 0.9;
            margin-top: 5px;
        }
       .cards-display {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin: 20px 0;
            min-height: 140px;
            perspective: 1000px;
        }
       .card {
            background: #1a5c3a;
            border: 2px solid #2d7a4f;
            border-radius: 8px;
            padding: 8px 4px;
            text-align: center;
            font-size: 0.75em;
            cursor: pointer;
            transition: all 0.3s;
            opacity: 0;
            transform: rotateY(90deg) scale(0.5);
        }
       .card.show {
            opacity: 1;
            transform: rotateY(0) scale(1);
        }
       .card:hover {
            transform: translateY(-5px) scale(1.05);
        }
       .card.bronze { border-color: #cd7f32; background: linear-gradient(135deg, #1a5c3a, #4a3a1a); }
       .card.silver { border-color: #c0c0c0; background: linear-gradient(135deg, #1a5c3a, #4a4a4a); }
       .card.gold {
            border-color: #ffd700;
            background: linear-gradient(135deg, #1a5c3a, #4a4a1a);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
            animation: goldGlow 1s ease-in-out;
        }
       .card.legend {
            border-color: #ff6b35;
            background: linear-gradient(135deg, #1a5c3a, #4a1a1a);
            box-shadow: 0 0 20px rgba(255, 107, 53, 0.8);
            animation: legendPulse 0.6s ease-in-out;
        }
        @keyframes goldGlow {
            0%, 100% { box-shadow: 0 0 15px rgba(255, 215, 0, 0.5); }
            50% { box-shadow: 0 0 30px rgba(255, 215, 0, 0.9); }
        }
        @keyframes legendPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); box-shadow: 0 0 40px rgba(255, 107, 53, 1); }
            100% { transform: scale(1); }
        }
       .card-rating {
            font-weight: bold;
            font-size: 1.3em;
            margin-bottom: 3px;
        }
       .card-name {
            font-size: 0.8em;
            line-height: 1.1;
        }
       .card-value {
            font-size: 0.7em;
            opacity: 0.8;
            margin-top: 3px;
        }
       .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #ffd700;
            pointer-events: none;
            z-index: 9999;
            animation: confettiFall 2s linear forwards;
        }
        @keyframes confettiFall {
            to {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }
       .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
       .tab {
            flex: 1;
            background: #1a5c3a;
            border: 2px solid #2d7a4f;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
       .tab.active {
            background: #2d7a4f;
            border-color: #ffd700;
        }
       .collection {
            background: #083a23;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #1a5c3a;
            max-height: 400px;
            overflow-y: auto;
        }
       .collection-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
       .collection-card {
            background: #1a5c3a;
            border: 2px solid #2d7a4f;
            border-radius: 6px;
            padding: 6px 3px;
            text-align: center;
            font-size: 0.7em;
        }
       .collection-card.owned { opacity: 1; }
       .collection-card.unowned { opacity: 0.3; filter: grayscale(100%); }
       .progress-bar {
            background: #1a5c3a;
            height: 20px;
            border-radius: 10px;
            margin: 10px 0;
            overflow: hidden;
        }
       .progress-fill {
            background: linear-gradient(90deg, #2d7a4f, #ffd700);
            height: 100%;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
            font-weight: bold;
        }
       .shop-item {
            background: #1a5c3a;
            border: 2px solid #2d7a4f;
            border-radius: 8px;
            margin: 10px 0;
            padding: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
       .shop-item:hover:not(.disabled) { background: #2d7a4f; }
       .shop-item.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
       .rebirth {
            background: linear-gradient(135deg, #8b6914, #d4af37);
            border: 2px solid #ffd700;
        }
       .sell-all-btn {
            background: #e74c3c;
            border: 2px solid #c0392b;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin: 10px 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚽ Card Pack Opener ⚽</h1>

        <div class="stats-bar">
            <div class="stat">Money<br><span class="stat-value">£<span id="money">5000</span></span></div>
            <div class="stat">Cards<br><span class="stat-value"><span id="totalCards">0</span></span></div>
            <div class="stat">Prestige<br><span class="stat-value"><span id="prestige">0</span></span></div>
        </div>

        <div class="pack-section">
            <div class="pack-buttons">
                <button class="pack-btn pack-standard" onclick="openPack('standard')">
                    STANDARD PACK - £1,000
                    <div class="pack-odds">Legend: 2% | Gold: 8% | Silver: 20%</div>
                </button>
                <button class="pack-btn pack-premium" onclick="openPack('premium')">
                    PREMIUM PACK - £5,000
                    <div class="pack-odds">Legend: 8% | Gold: 20% | Silver: 40%</div>
                </button>
                <button class="pack-btn pack-ultimate" onclick="openPack('ultimate')">
                    ULTIMATE PACK - £25,000
                    <div class="pack-odds">Legend: 25% | Gold: 40% | Silver: 30%</div>
                </button>
            </div>
            <div class="cards-display" id="cardsDisplay"></div>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('collection')">Collection</div>
            <div class="tab" onclick="switchTab('shop')">Shop</div>
        </div>

        <div id="collection-tab" class="collection">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%">0/100</div>
            </div>
            <button class="sell-all-btn" onclick="sellAllDuplicates()">Sell All Duplicates</button>
            <div class="collection-grid" id="collectionGrid"></div>
        </div>

        <div id="shop-tab" class="collection" style="display:none;">
            <div class="shop-item rebirth" id="rebirth" onclick="prestige()">
                <div style="font-weight: bold; font-size: 1.1em;">🏆 PRESTIGE 🏆</div>
                <div style="font-size: 0.85em; margin-top: 5px;">Reset cards, keep 2x pack luck on ALL packs | Cost: £100,000</div>
            </div>
            <div class="shop-item" onclick="buyBetterPacks()">
                <div style="font-weight: bold;">Premium Pack Upgrade</div>
                <div style="font-size: 0.85em; margin-top: 5px;">+1% Legend chance on ALL packs | Cost: £<span id="upgradeCost">10000</span> | Owned: <span id="upgradeOwned">0</span></div>
            </div>
        </div>
    </div>

<script>
let money = 5000;
let totalCards = 0;
let prestige = 0;
let betterPackLevel = 0;
let betterPackCost = 10000;

const PACKS = {
    standard: { cost: 1000, legend: 0.02, gold: 0.08, silver: 0.20 },
    premium: { cost: 5000, legend: 0.08, gold: 0.20, silver: 0.40 },
    ultimate: { cost: 25000, legend: 0.25, gold: 0.40, silver: 0.30 }
};

const PLAYERS = [
    { name: "Local Hero", rating: 45, rarity: "bronze", value: 50 },
    { name: "Academy Kid", rating: 48, rarity: "bronze", value: 60 },
    { name: "Sunday League", rating: 52, rarity: "bronze", value: 70 },
    { name: "Bench Warmer", rating: 55, rarity: "bronze", value: 80 },
    { name: "Reserve Player", rating: 58, rarity: "bronze", value: 90 },
    { name: "Youth Prospect", rating: 61, rarity: "bronze", value: 100 },
    { name: "Club Mascot", rating: 40, rarity: "bronze", value: 40 },
    { name: "Water Boy", rating: 42, rarity: "bronze", value: 45 },
    { name: "Solid Defender", rating: 66, rarity: "silver", value: 200 },
    { name: "Midfield Engine", rating: 68, rarity: "silver", value: 250 },
    { name: "Pacy Winger", rating: 71, rarity: "silver", value: 300 },
    { name: "Clinical Striker", rating: 73, rarity: "silver", value: 350 },
    { name: "Team Captain", rating: 75, rarity: "silver", value: 400 },
    { name: "Set Piece Pro", rating: 77, rarity: "silver", value: 450 },
    { name: "Star Player", rating: 82, rarity: "gold", value: 1000 },
    { name: "World Class", rating: 85, rarity: "gold", value: 1500 },
    { name: "Elite Talent", rating: 87, rarity: "gold", value: 2000 },
    { name: "Team Legend", rating: 89, rarity: "gold", value: 2500 },
    { name: "Messi", rating: 93, rarity: "legend", value: 10000 },
    { name: "Ronaldo", rating: 92, rarity: "legend", value: 9000 },
    { name: "Haaland", rating: 91, rarity: "legend", value: 8000 },
    { name: "Mbappe", rating: 91, rarity: "legend", value: 8000 },
    { name: "De Bruyne", rating: 90, rarity: "legend", value: 7000 },
];

// Generate 100 unique cards
for (let i = PLAYERS.length; i < 100; i++) {
    let rating = Math.floor(Math.random() * 25) + 40;
    let rarity = rating >= 90? "legend" : rating >= 80? "gold" : rating >= 65? "silver" : "bronze";
    let value = rating * (rarity === "legend"? 100 : rarity === "gold"? 20 : rarity === "silver"? 5 : 1);
    PLAYERS.push({
        name: `Player ${i}`,
        rating: rating,
        rarity: rarity,
        value: value
    });
}

let collection = {};
PLAYERS.forEach(p => collection[p.name] = 0);

function getPackOdds(packType) {
    let base = PACKS[packType];
    let legendBonus = (betterPackLevel * 0.01) + (prestige * 0.01);
    return {
        legend: base.legend + legendBonus,
        gold: base.gold,
        silver: base.silver
    };
}

function openPack(packType) {
    let pack = PACKS[packType];
    if (money < pack.cost) return;
    if (document.querySelector('.confetti')) return; // Prevent spam during animation

    money -= pack.cost;
    updateDisplay();

    const cardsDisplay = document.getElementById('cardsDisplay');
    cardsDisplay.innerHTML = '';

    const odds = getPackOdds(packType);
    let hasLegend = false;

    for (let i = 0; i < 5; i++) {
        setTimeout(() => {
            let rand = Math.random();
            let rarity;
            if (rand < odds.legend) {
                rarity = "legend";
                hasLegend = true;
            }
            else if (rand < odds.legend + odds.gold) rarity = "gold";
            else if (rand < odds.legend + odds.gold + odds.silver) rarity = "silver";
            else rarity = "bronze";

            let pool = PLAYERS.filter(p => p.rarity === rarity);
            let card = pool[Math.floor(Math.random() * pool.length)];

            collection[card.name]++;
            if (collection[card.name] === 1) totalCards++;

            const cardEl = document.createElement('div');
            cardEl.className = `card ${card.rarity}`;
            cardEl.innerHTML = `
                <div class="card-rating">${card.rating}</div>
                <div class="card-name">${card.name}</div>
                <div class="card-value">£${card.value}</div>
            `;
            cardEl.onclick = () => sellCard(card.name);
            cardsDisplay.appendChild(cardEl);

            // Trigger animation
            setTimeout(() => {
                cardEl.classList.add('show');
                if (card.rarity === 'legend') createConfetti();
            }, 50);

            if (i === 4) {
                updateDisplay();
                saveGame();
                renderCollection();
            }
        }, i * 300);
    }
}

function createConfetti() {
    for (let i = 0; i < 30; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        confetti.style.left = Math.random() * 100 + '%';
        confetti.style.background = ['#ffd700', '#ff6b35', '#f72585', '#4caf50'][Math.floor(Math.random() * 4)];
        confetti.style.animationDelay = Math.random() * 0.5 + 's';
        document.body.appendChild(confetti);
        setTimeout(() => confetti.remove(), 2000);
    }
}

function sellCard(cardName) {
    if (collection[cardName] > 1) {
        let card = PLAYERS.find(p => p.name === cardName);
        collection[cardName]--;
        money += Math.floor(card.value * 0.5);
        updateDisplay();
        saveGame();
    }
}

function sellAllDuplicates() {
    let earned = 0;
    for (let name in collection) {
        if (collection[name] > 1) {
            let card = PLAYERS.find(p => p.name === name);
            let dupes = collection[name] - 1;
            earned += Math.floor(card.value * 0.5) * dupes;
            collection[name] = 1;
        }
    }
    money += earned;
    updateDisplay();
    saveGame();
    renderCollection();
}

function buyBetterPacks() {
    if (money >= betterPackCost) {
        money -= betterPackCost;
        betterPackLevel++;
        betterPackCost = Math.floor(betterPackCost * 2);
        updateDisplay();
        saveGame();
    }
}

function prestige() {
    if (money < 100000) return;

    if (confirm('Prestige for £100,000?\n\nYou will lose all cards and money but gain 2x pack luck on ALL packs permanently!\nThis stacks with each prestige.')) {
        prestige++;
        money = 5000;
        totalCards = 0;
        betterPackLevel = 0;
        betterPackCost = 10000;
        PLAYERS.forEach(p => collection[p.name] = 0);
        updateDisplay();
        saveGame();
        renderCollection();
        document.getElementById('cardsDisplay').innerHTML = '';
    }
}

function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');

    if (tab === 'collection') {
        document.getElementById('collection-tab').style.display = 'block';
        document.getElementById('shop-tab').style.display = 'none';
        renderCollection();
    } else {
        document.getElementById('collection-tab').style.display = 'none';
        document.getElementById('shop-tab').style.display = 'block';
    }
}

function renderCollection() {
    const grid = document.getElementById('collectionGrid');
    grid.innerHTML = '';

    PLAYERS.sort((a, b) => b.rating - a.rating).forEach(card => {
        const owned = collection[card.name] > 0;
        const cardEl = document.createElement('div');
        cardEl.className = `collection-card ${card.rarity} ${owned? 'owned' : 'unowned'}`;
        cardEl.innerHTML = `
            <div style="font-weight: bold;">${card.rating}</div>
            <div style="font-size: 0.65em;">${card.name}</div>
            ${owned? `<div style="font-size: 0.6em; opacity: 0.7;">x${collection[card.name]}</div>` : ''}
        `;
        grid.appendChild(cardEl);
    });

    let owned = Object.values(collection).filter(v => v > 0).length;
    let percent = Math.floor((owned / 100) * 100);
    document.getElementById('progressFill').style.width = percent + '%';
    document.getElementById('progressFill').textContent = `${owned}/100`;
}

function updateDisplay() {
    document.getElementById('money').textContent = money.toLocaleString();
    document.getElementById('totalCards').textContent = totalCards;
    document.getElementById('prestige').textContent = prestige;
    document.getElementById('upgradeCost').textContent = betterPackCost.toLocaleString();
    document.getElementById('upgradeOwned').textContent = betterPackLevel;

    document.querySelectorAll('.pack-btn').forEach((btn, i) => {
        let costs = [1000, 5000, 25000];
        btn.disabled = money < costs[i];
    });

    document.getElementById('rebirth').classList.toggle('disabled', money < 100000);
}

function saveGame() {
    const save = {
        money, totalCards, prestige, betterPackLevel, betterPackCost, collection
    };
    localStorage.setItem('cardPackGame', JSON.stringify(save));
}

function loadGame() {
    const save = JSON.parse(localStorage.getItem('cardPackGame'));
    if (save) {
        money = save.money || 5000;
        totalCards = save.totalCards || 0;
        prestige = save.prestige || 0;
        betterPackLevel = save.betterPackLevel || 0;
        betterPackCost = save.betterPackCost || 10000;
        if (save.collection) collection = save.collection;
    }
}

loadGame();
updateDisplay();
renderCollection();
</script>
</body>
</html>
